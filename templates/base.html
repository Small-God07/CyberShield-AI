<!DOCTYPE html>
<html lang="fr" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}CyberShield AI{% endblock %}</title>

  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

<!-- ── Navbar ──────────────────────────────────────────────────────────── -->
<nav class="navbar navbar-expand-lg navbar-dark cyber-navbar fixed-top">
  <div class="container-fluid px-4">
    <a class="navbar-brand fw-bold cyber-brand" href="{{ url_for('index') }}">
      🛡️ CyberShield <span class="text-cyan">AI</span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto gap-1">
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}" href="{{ url_for('index') }}">
            <i class="bi bi-speedometer2"></i> Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'analyser' %}active{% endif %}" href="{{ url_for('analyser') }}">
            <i class="bi bi-shield-check"></i> Analyser
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'historique_page' %}active{% endif %}" href="{{ url_for('historique_page') }}">
            <i class="bi bi-clock-history"></i> Historique
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'documentation' %}active{% endif %}" href="{{ url_for('documentation') }}">
            <i class="bi bi-book"></i> Documentation
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- ── Main content ─────────────────────────────────────────────────────── -->
<main class="container-fluid px-4 py-4 mt-5 pt-4">
  {% block content %}{% endblock %}
</main>

<!-- ── Footer ───────────────────────────────────────────────────────────── -->
<footer class="cyber-footer text-center py-3 mt-5">
  <small class="text-muted">
    🛡️ <strong>CyberShield AI</strong> — Projet scolaire - Détection de cyberattaques par IA &nbsp;|&nbsp;
    Random Forest · Flask · Python
  </small>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
